syntax = "proto2";

package testpt;

import "tensor.proto";
import "tecokernel/memset.proto";
import "tecokernel/reduce_variance.proto";
import "tecokernel/reshape_and_cache.proto";
import "tecokernel/rms_norm.proto";
import "tecokernel/flash_attention.proto";
import "tecokernel/causal_conv1d.proto";

message TecokernelParam {
    optional MemsetParam memset_param                            = 1;
    optional ReduceVarianceParam reduce_variance_param           = 2;
    optional ReshapeAndCacheParam reshape_and_cache_param        = 3;
    optional RmsNormParam rms_norm_param                         = 4;
    optional FlashAttentionParam flash_attention_param           = 5;
    optional CausalConv1dParam causal_conv1d_param               = 6;
}
